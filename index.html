    <nav class="venue-tabs" aria-label="Choose a campus">
      <button
        class="venue-tab is-active"
        type="button"
        data-venue="oic"
        aria-selected="true"
      >
        OIC
      </button>

      <button
        class="venue-tab"
        type="button"
        data-venue="kic"
        aria-selected="false"
      >
        KIC
      </button>
    </nav>

    <section class="search-section">
      <label class="search-box">
        <img
          class="search-icon-image"
          src="images/search.png"
          alt=""
          aria-hidden="true"
        >

        <input
          id="organisationSearch"
          type="search"
          placeholder="Search organisation"
          autocomplete="off"
          aria-label="Search for an organisation"
        >
      </label>

      <p
        id="searchMessage"
        class="search-message"
        aria-live="polite"
      ></p>
    </section>
