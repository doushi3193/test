<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Welcome Festival Map</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="js/map.js" defer></script>
</head>

<body>
  <header class="site-header">
    <h1 class="site-title">Welcome Festival Map</h1>
  </header>

  <main>
    <nav class="venue-tabs" aria-label="Choose a campus">
      <button
        class="venue-tab is-active"
        type="button"
        data-venue="oic"
        aria-selected="true"
      >
        OIC
      </button>

      <button
        class="venue-tab"
        type="button"
        data-venue="kic"
        aria-selected="false"
      >
        KIC
      </button>
    </nav>

    <section class="search-section">
      <label class="search-box">
        <img
          class="search-icon-image"
          src="images/search.png"
          alt=""
          aria-hidden="true"
        >

        <input
          id="organisationSearch"
          type="search"
          placeholder="Search organisation"
          autocomplete="off"
          aria-label="Search for an organisation"
        >
      </label>

      <p
        id="searchMessage"
        class="search-message"
        aria-live="polite"
      ></p>
    </section>

    <section class="map-section">
      <div class="floor-switch" aria-label="Choose a floor">
        <button
          class="floor-button"
          type="button"
          data-floor="1"
          aria-selected="false"
        >
          1F
        </button>

        <button
          class="floor-button is-active"
          type="button"
          data-floor="3"
          aria-selected="true"
        >
          3F
        </button>
      </div>

      <div class="map-viewport" id="mapViewport">
        <div class="map-transform-layer" id="mapTransformLayer">
          <svg
            id="floorMap"
            class="floor-map"
            viewBox="0 0 760 650"
            role="img"
            aria-label="OIC third floor map"
          >
            <!-- Building base -->
            <path
              class="map-building"
              d="
                M48 90
                H200
                V190
                H325
                V90
                H475
                V190
                H560
                V90
                H640
                V180
                H710
                V420
                H760
                V492
                H710
                V610
                H560
                V492
                H475
                V610
                H325
                V492
                H248
                V420
                H48
                V492
                H0
                V420
                H48
                V234
                H0
                V190
                H48
                Z

                M200 234
                H325
                V420
                H248
                V282
                H200
                Z

                M475 234
                H560
                V420
                H475
                Z
              "
              fill-rule="evenodd"
            />

            <!-- Left section -->
            <g class="map-room" data-room-id="as368" tabindex="0" role="button" aria-label="AS368">
              <rect x="63" y="107" width="55" height="36" />
              <text x="90.5" y="125" dy="0.35em">AS368</text>
            </g>

            <g class="map-room" data-room-id="as358" tabindex="0" role="button" aria-label="AS358">
              <rect x="130" y="107" width="55" height="36" />
              <text x="157.5" y="125" dy="0.35em">AS358</text>
            </g>

            <g class="map-room" data-room-id="as357" tabindex="0" role="button" aria-label="AS357">
              <rect x="130" y="148" width="55" height="36" />
              <text x="157.5" y="166" dy="0.35em">AS357</text>
            </g>

            <g class="map-room" data-room-id="as365" tabindex="0" role="button" aria-label="AS365">
              <rect x="63" y="242" width="55" height="36" />
              <text x="90.5" y="260" dy="0.35em">AS365</text>
            </g>

            <g class="map-room" data-room-id="as356" tabindex="0" role="button" aria-label="AS356">
              <rect x="130" y="242" width="55" height="36" />

            </g>

              <text x="157.5" y="360" class="multiline-room-name">
                <tspan x="157.5" dy="-0.35em">PS</tspan>
                <tspan x="157.5" dy="1.3em">Lounge</tspan>
              </text>
            </g>

            <!-- Middle section -->
            <g class="map-room" data-room-id="ac348" tabindex="0" role="button" aria-label="AC348">

            </g>

            <g class="map-room" data-room-id="ac345" tabindex="0" role="button" aria-label="AC345">
              <rect x="337" y="242" width="55" height="36" />

            </g>

            <g class="map-room" data-room-id="ac336" tabindex="0" role="button" aria-label="AC336">
              <rect x="405" y="242" width="55" height="36" />
              <text x="432.5" y="260" dy="0.35em">AC336</text>
            </g>

            <g class="map-room" data-room-id="ac344" tabindex="0" role="button" aria-label="AC344">
              <rect x="337" y="282" width="55" height="36" />
              <text x="364.5" y="300" dy="0.35em">AC344</text>
            </g>

            <g class="map-room" data-room-id="ac343" tabindex="0" role="button" aria-label="AC343">

            <g class="map-room" data-room-id="an328" tabindex="0" role="button" aria-label="AN328">

              <text x="599.5" y="260" dy="0.35em">AN325</text>
            </g>

            <g class="map-room" data-room-id="an324" tabindex="0" role="button" aria-label="AN324">
              <rect x="572" y="282" width="55" height="36" />
              <text x="599.5" y="300" dy="0.35em">AN324</text>
            </g>

            <g class="map-room" data-room-id="an323" tabindex="0" role="button" aria-label="AN323">
              <rect x="572" y="322" width="55" height="36" />
              <text x="599.5" y="340" dy="0.35em">AN323</text>
            </g>

            <g class="map-room" data-room-id="an322" tabindex="0" role="button" aria-label="AN322">
              <rect x="572" y="362" width="55" height="36" />
              <text x="599.5" y="380" dy="0.35em">AN322</text>
            </g>

            <g class="map-room" data-room-id="an321" tabindex="0" role="button" aria-label="AN321">
              <rect x="572" y="402" width="55" height="36" />
              <text x="599.5" y="420" dy="0.35em">AN321</text>
            </g>

            <g class="map-room" data-room-id="an316" tabindex="0" role="button" aria-label="AN316">
              <rect x="640" y="197" width="55" height="36" />
              <text x="667.5" y="215" dy="0.35em">AN316</text>
            </g>

            <g class="map-room map-room-tall student-lounge" data-room-id="student-lounge" tabindex="0" role="button" aria-label="Student Lounge">
              <rect x="640" y="242" width="55" height="196" />
              <text x="667.5" y="340" class="multiline-room-name">
                <tspan x="667.5" dy="-0.35em">Student</tspan>
                <tspan x="667.5" dy="1.3em">Lounge</tspan>
              </text>
            </g>

            <!-- Lower rooms -->
            <g class="map-room map-room-large" data-room-id="ac330" tabindex="0" role="button" aria-label="AC330">
              <rect x="337" y="505" width="123" height="85" />
              <text x="398.5" y="547.5" dy="0.35em">AC330</text>
            </g>

            <g class="map-room map-room-large" data-room-id="an310" tabindex="0" role="button" aria-label="AN310">
              <rect x="572" y="505" width="123" height="85" />
              <text x="633.5" y="547.5" dy="0.35em">AN310</text>
            </g>
          </svg>
        </div>
      </div>

      <div class="zoom-controls" aria-label="Map zoom controls">
        <button
          id="zoomInButton"
          class="zoom-button zoom-in-button"
          type="button"
          aria-label="Zoom in"
        >
          +
        </button>

        <button
          id="zoomOutButton"
          class="zoom-button"
          type="button"
          aria-label="Zoom out"
        >
          −
        </button>
      </div>
    </section>

    <nav class="category-nav" aria-label="Organisation categories">
      <button class="category-button" type="button" data-category="sports" aria-pressed="false">
        <img class="category-icon-image" src="images/sports.png" alt="" aria-hidden="true">
        <span>Sports</span>
      </button>

      <button class="category-button" type="button" data-category="culture" aria-pressed="false">
        <img class="category-icon-image" src="images/culture.png" alt="" aria-hidden="true">
        <span>Culture</span>
      </button>

      <button class="category-button" type="button" data-category="academic" aria-pressed="false">
        <img class="category-icon-image" src="images/academic.png" alt="" aria-hidden="true">
        <span>Academic</span>
      </button>

      <button class="category-button" type="button" data-category="volunteering" aria-pressed="false">
        <img class="category-icon-image" src="images/volunteering.png" alt="" aria-hidden="true">
        <span>Volunteering</span>
      </button>
    </nav>
  </main>

  <div id="roomPopup" class="popup-overlay" hidden>
    <section
      class="room-popup"
      role="dialog"
      aria-modal="true"
      aria-labelledby="popupRoomName"
    >
      <button
        id="closePopupButton"
        class="popup-close"
        type="button"
        aria-label="Close the room information"
      >
        ×
      </button>

      <h2 id="popupRoomName" class="popup-title">Room</h2>

      <p id="popupCondition" class="popup-condition"></p>

      <div
        id="popupOrganisationList"
        class="organisation-list"
      ></div>

      <a
        id="roomPageLink"
        class="room-link-button"
        href="room.html"
      >
        Go to room
      </a>
    </section>
  </div>
</body>
</html>
