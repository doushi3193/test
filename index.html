<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Welcome Festival Map</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="js/map.js" defer></script>
</head>

<body>
  <header class="site-header">
    <h1 class="site-title">Welcome Festival Map</h1>
  </header>

  <main>
    <nav class="venue-tabs" aria-label="Choose a campus">
      <button
        class="venue-tab is-active"
        type="button"
        data-venue="oic"
        aria-selected="true"
      >
        OIC
      </button>

      <button
        class="venue-tab"
        type="button"
        data-venue="kic"
        aria-selected="false"
      >
        KIC
      </button>
    </nav>

    <section class="search-section">
      <label class="search-box">
        <img
          class="search-icon-image"
          src="images/search.png"
          alt=""
          aria-hidden="true"
        >

        <input
          id="organisationSearch"
          type="search"
          placeholder="Search organisation"
          autocomplete="off"
          aria-label="Search for an organisation"
        >
      </label>

      <p
        id="searchMessage"
        class="search-message"
        aria-live="polite"
      ></p>
    </section>

    <section class="map-section">
      <div class="floor-switch" aria-label="Choose a floor">
        <button
          class="floor-button"
          type="button"
          data-floor="1"
          aria-selected="false"
        >
          1F
        </button>

        <button
          class="floor-button is-active"
          type="button"
          data-floor="3"
          aria-selected="true"
        >
          3F
        </button>
      </div>

      <div class="map-viewport" id="mapViewport">
        <div class="map-transform-layer" id="mapTransformLayer">
          <svg
            id="floorMap"
            class="floor-map"
            viewBox="0 0 760 650"
            role="img"
            aria-label="OIC third floor map"
          >
            <g
              class="floor-layout"
              data-floor-layout="1"
              aria-label="OIC first floor map"
              aria-hidden="true"
              style="display: none;"
            >
              <rect class="map-building" x="48" y="90" width="152" height="402" />
              <rect class="map-building" x="325" y="90" width="150" height="520" />
              <rect class="map-building" x="560" y="90" width="150" height="520" />
              <rect class="map-building" x="0" y="190" width="710" height="44" />
              <rect class="map-building" x="48" y="438" width="662" height="54" />

              <g
                class="map-room"
                data-room-id="room-8"
                tabindex="0"
                role="button"
                aria-label="Room 8"
              >
                <rect x="151" y="461" width="26" height="36"/>
                <text x="164" y="479" class="multiline-room-name">
                  <tspan x="164" dy="-0.1em">Room</tspan>
                  <tspan x="164" dy="1.1em">8</tspan>
                </text>
              </g>

              <g
                class="map-room"
                data-room-id="room-7"
                tabindex="0"
                role="button"
                aria-label="Room 7"

                  <tspan x="358" dy="-0.1em">Room</tspan>
                  <tspan x="358" dy="1.1em">7</tspan>
                </text>
              </g>

              <g
                class="map-room"
                data-room-id="room-6"
                tabindex="0"
                role="button"
                aria-label="Room 6"

                <rect x="430" y="461" width="26" height="36"/>

                  <tspan x="443" dy="-0.1em">Room</tspan>
                  <tspan x="443" dy="1.1em">6</tspan>
                </text>
              </g>

              <g

            </g>

            </g>

            <g class="map-room map-room-tall" data-room-id="ba-house" tabindex="0" role="button" aria-label="BA House">
              <rect x="405" y="282" width="55" height="156" />
              <text x="432.5" y="360" class="multiline-room-name">
                <tspan x="432.5" dy="-0.35em">BA</tspan>

            </g>

            </g>

              <rect x="640" y="242" width="55" height="196" />
              <text x="667.5" y="340" class="multiline-room-name">
                <tspan x="667.5" dy="-0.35em">Student</tspan>
                <tspan x="667.5" dy="1.3em">Lounge</tspan>
              </text>
            </g>

            <g class="map-room map-room-large" data-room-id="ac330" tabindex="0" role="button" aria-label="AC330">
              <rect x="337" y="505" width="123" height="85" />
              <text x="398.5" y="547.5" dy="0.35em">AC330</text>

          </svg>
        </div>
      </div>

      <div class="zoom-controls" aria-label="Map zoom controls">
        <button
          id="zoomInButton"
          class="zoom-button"
          type="button"
          aria-label="Zoom in"
        >
          +
        </button>

        <button
          id="zoomOutButton"
          class="zoom-button"
          type="button"
          aria-label="Zoom out"
        >
          −
        </button>
      </div>
    </section>

    <nav class="category-nav" aria-label="Organisation categories">
      <button
        class="category-button category-central"
        type="button"
        data-category="central"
        aria-pressed="false"
      >
        <img class="category-icon-image" src="images/central.png" alt="" aria-hidden="true">

        <span>Central Part</span>
      </button>

      <button
        class="category-button category-sports"
        type="button"
        data-category="sports"
        aria-pressed="false"
      >
        <img class="category-icon-image" src="images/sports.png" alt="" aria-hidden="true">

        <span>Sports</span>
      </button>

      <button
        class="category-button category-culture"
        type="button"
        data-category="culture"
        aria-pressed="false"
      >
        <img class="category-icon-image" src="images/culture.png" alt="" aria-hidden="true">

        <span>Culture &amp;<br>Expression</span>
      </button>

      <button
        class="category-button category-research-volunteering"
        type="button"
        data-category="research-volunteering"
        aria-pressed="false"
      >
        <img class="category-icon-image" src="images/research-volunteering.png" alt="" aria-hidden="true">

        <span>Research &amp;<br>Volunteering</span>
      </button>
    </nav>
  </main>

  <div id="roomPopup" class="popup-overlay" hidden>
    <section
      class="room-popup"
      role="dialog"
      aria-modal="true"
      aria-labelledby="popupRoomName"
    >
      <button
        id="closePopupButton"
        class="popup-close"
        type="button"
        aria-label="Close the room information"
      >
        ×
      </button>

      <h2 id="popupRoomName" class="popup-title">Room</h2>

      <p id="popupCondition" class="popup-condition"></p>

      <div
        id="popupOrganisationList"
        class="organisation-list"
      ></div>

      <a
        id="roomPageLink"
        class="room-link-button"
        href="room.html"
      >
        Go to room
      </a>
    </section>
  </div>
</body>
</html>
